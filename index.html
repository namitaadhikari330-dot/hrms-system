<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Smart HR Management System to manage employees, payroll, attendance and performance in one secure platform."
    />
    <meta
      name="keywords"
      content="HRMS, HR Management, Payroll System, Attendance Tracking, Employee Management"
    />

    <meta property="og:title" content="Smart HR Management System" />

      content="All-in-one HR solution for modern businesses."

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <title>HRMS System | Smart HR Management</title>

    <style>
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background-color: #f9fafb;

      #root:empty::before {
        content: "Loading HRMS...";

        justify-content: center;
        align-items: center;
        height: 100vh;
        font-size: 18px;
        color: #4f46e5;
